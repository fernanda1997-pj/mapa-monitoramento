<!DOCTYPE html>
<html>
<head>
    <title>Mapa de Monitoramento</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style> #map { height: 100vh; width: 100%; } </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-10.1678, -48.3331], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Certifique-se de que o arquivo está na pasta 'data'
        fetch('data/pontos.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data).addTo(map);
            })
            .catch(err => console.error("Erro ao carregar o arquivo:", err));
    </script>
</body>
</html>
