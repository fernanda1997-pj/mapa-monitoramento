<!DOCTYPE html>
<html>
<head>
    <title>Mapa de Monitoramento</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 100vh; width: 100%; }</style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-10.1678, -48.3331], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Usando o caminho com %20 para o espaço no nome da pasta
        fetch('mygeodata%20(4)/pontos.geojson')
          .then(res => res.json())
          .then(data => {
            L.geoJSON(data, {
              onEachFeature: function (feature, layer) {
                layer.bindPopup("<b>ID: " + feature.properties.Id + "</b><br>X: " + feature.properties.X + "<br>Y: " + feature.properties.Y);
              }
            }).addTo(map);
          });
    </script>
</body>
</html>
