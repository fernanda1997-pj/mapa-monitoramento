<!DOCTYPE html>
<html>
<head>
    <title>Mapa de Monitoramento</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([-10.1678, -48.3331], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // O arquivo deve estar na pasta 'data' dentro do seu repositório
        // O nome deve ser exatamente o que você vê no seu repositório
fetch('dados/pontos.geojson') 
  .then(res => res.json())
  .then(data => {
    L.geoJSON(data).addTo(map);
  });
          .then(response => {
              if (!response.ok) throw new Error('Arquivo não encontrado');
              return response.json();
          })
          .then(data => {
            L.geoJSON(data, {
              onEachFeature: function (feature, layer) {
                layer.bindPopup("<b>ID: " + feature.properties.Id + "</b><br>X: " + feature.properties.X + "<br>Y: " + feature.properties.Y);
              }
            }).addTo(map);
          })
          .catch(err => console.error("Erro ao carregar o GeoJSON:", err));
    </script>
</body>
</html>
